spring.application.name=gestion_charite

# Load developer-local secrets/config when present.
spring.config.import=optional:classpath:application-local.properties

server.port=8080

spring.datasource.url=jdbc:h2:file:./data/gestion_charite_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Google OAuth (fill with your Google Cloud OAuth credentials)
app.oauth.google.client-id=${GOOGLE_CLIENT_ID:}
app.oauth.google.client-secret=${GOOGLE_CLIENT_SECRET:}
app.oauth.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/google/callback}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}

# PayPal (sandbox by default)
app.paypal.base-url=https://api-m.sandbox.paypal.com
app.paypal.client-id=${PAYPAL_CLIENT_ID:}
app.paypal.client-secret=${PAYPAL_CLIENT_SECRET:}

# Stripe
app.stripe.base-url=https://api.stripe.com
app.stripe.secret-key=${STRIPE_SECRET_KEY:}

# Notifications
app.notifications.email.enabled=false
app.notifications.from=no-reply@gestion-charite.local

