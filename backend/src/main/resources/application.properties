spring.application.name=gestion_charite

server.port=8080

spring.datasource.url=jdbc:h2:mem:gestion_charite_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Google OAuth (fill with your Google Cloud OAuth credentials)
app.oauth.google.client-id=
app.oauth.google.client-secret=
app.oauth.google.redirect-uri=http://localhost:8080/api/auth/google/callback
app.frontend-url=http://localhost:5173
